<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapay Zeka Çizgi Roman RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Patrick+Hand&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Patrick Hand"', 'cursive'],
                        comic: ['"Anton"', 'sans-serif'],
                    },
                    colors: {
                        comicYellow: '#FFD700',
                        comicRed: '#E60000',
                        comicBlue: '#0055FF',
                        comicDark: '#111',
                    },
                    boxShadow: {
                        'comic': '6px 6px 0px 0px rgba(0,0,0,1)',
                        'comic-lg': '10px 10px 0px 0px rgba(0,0,0,1)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            /* Çizgi romanlara özgü noktalı (halftone) arkaplan deseni */
            background-color: #f0f0f0;
            background-image: radial-gradient(#ccc 15%, transparent 16%), radial-gradient(#ccc 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: #111;
        }
        
        /* Özel Kaydırma Çubuğu */
        .custom-scrollbar::-webkit-scrollbar {
            width: 12px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #fff; 
            border-left: 2px solid #000;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #FFD700; 
            border: 2px solid #000;
        }

        /* Çizgi Roman Paneli Stilleri */
        .comic-panel {
            background: white;
            border: 4px solid black;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .narration-box {
            background: #fff;
            border: 3px solid black;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            position: relative;
        }

        /* Yükleme Animasyonları */
        .loading-text {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .image-container img {
            width: 100%;
            height: auto;
            border-bottom: 4px solid black;
            object-fit: cover;
        }

        /* Konuşma Balonu Stili */
        .speech-bubble {
            position: relative;
            background: #fff;
            border: 3px solid #000;
            border-radius: 20px;
            padding: 10px 15px;
            margin-top: 10px;
            font-family: '"Patrick Hand"', cursive;
            font-size: 1.15rem;
            box-shadow: 3px 3px 0px 0px rgba(0,0,0,1);
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 20px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: #000 transparent transparent transparent;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 22px;
            border-width: 11px 11px 0 0;
            border-style: solid;
            border-color: #fff transparent transparent transparent;
        }

        .character-name {
            font-weight: bold;
            color: #E60000;
            text-transform: uppercase;
            font-family: 'Anton', sans-serif;
            letter-spacing: 1px;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden font-sans">

    <!-- Header -->
    <header class="bg-white border-b-4 border-black p-4 flex justify-between items-center shadow-comic z-10 relative">
        <div class="flex items-center gap-3">
            <div class="bg-comicRed text-white border-2 border-black font-comic text-2xl px-3 py-1 transform -rotate-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                AI
            </div>
            <h1 class="text-3xl font-comic tracking-wide uppercase text-black">Çizgi Roman Üretici</h1>
        </div>
        <button id="resetGameBtn" class="hidden font-bold border-2 border-black px-4 py-2 bg-gray-200 hover:bg-comicYellow shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-colors transform hover:-translate-y-0.5 uppercase">
            Ana Menü
        </button>
    </header>

    <!-- Setup Screen (Başlangıç Ekranı) -->
    <main id="setupScreen" class="flex-1 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white p-8 border-4 border-black shadow-comic-lg w-full max-w-md transform rotate-1 my-auto">
            <h2 class="text-4xl font-comic mb-6 text-center text-comicBlue uppercase" style="-webkit-text-stroke: 1px black;">Kendi Maceranı Yarat!</h2>
            
            <div class="space-y-5 font-bold">
                <!-- Hikaye Detayları Alanı -->
                <div id="gameSettings" class="space-y-5 pt-2">
                    <div>
                        <label class="block text-lg mb-1 uppercase">Yapay Zeka Modeli</label>
                        <select id="modelSelect" class="w-full bg-white border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] px-4 py-3 focus:outline-none cursor-pointer">
                            <option value="llama3-8b-8192">Modeller Yükleniyor...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-lg mb-1 uppercase">Evren / Tema</label>
                        <select id="themeSelect" class="w-full bg-white border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] px-4 py-3 focus:outline-none cursor-pointer">
                            <option value="Siberpunk">Siberpunk (Neon, Teknoloji, Distopya)</option>
                            <option value="Fantastik">Orta Çağ Fantastik (Büyü, Ejderhalar)</option>
                            <option value="Kozmik Korku">Kozmik Korku (Karanlık, Gizem, Çaresizlik)</option>
                            <option value="Uzay Bilimkurgu">Uzay Macerası (Gezegenler, Uzaylılar)</option>
                            <option value="Post-Apokaliptik">Post-Apokaliptik (Çorak Topraklar, Hayatta Kalma)</option>
                            <option value="Süper Kahraman">Süper Kahraman (Metropol, Kötü Adamlar, Aksiyon)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-lg mb-1 uppercase text-comicBlue">Konu / Hikaye Fikriniz</label>
                        <p class="text-sm font-normal text-gray-600 mb-1">Ne hakkında bir çizgi roman okumak istiyorsunuz?</p>
                        <textarea id="topicInput" rows="3" placeholder="Örn: Siberpunk bir şehirde kayıp robot köpeğini arayan yalnız bir dedektif..." class="w-full bg-white border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] px-4 py-3 focus:outline-none focus:bg-yellow-50 transition-colors custom-scrollbar resize-none"></textarea>
                    </div>

                    <button id="startBtn" class="w-full bg-comicYellow hover:bg-yellow-400 text-black border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] font-comic text-3xl py-4 mt-4 uppercase tracking-wider transition-transform active:translate-y-1 active:shadow-none">
                        Çizgi Romanı Yarat!
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Game Screen (Çizgi Roman Görüntüleme Ekranı) -->
    <main id="gameScreen" class="hidden flex-1 flex flex-col p-4 md:p-8 max-w-5xl mx-auto w-full h-full overflow-hidden">
        
        <!-- Panellerin dizileceği alan -->
        <div id="chatContainer" class="flex-1 overflow-y-auto custom-scrollbar pr-4 pb-4 grid grid-cols-1 md:grid-cols-2 gap-8 auto-rows-max items-start">
            <!-- Dinamik Olarak Paneller Buraya Gelecek -->
        </div>

        <!-- Yükleme ve Aksiyon Alanı -->
        <div class="mt-6 bg-white border-4 border-black p-4 shadow-comic relative shrink-0 flex flex-col items-center justify-center min-h-[80px]">
            
            <div id="loadingIndicator" class="hidden flex items-center gap-4">
                <div class="animate-spin h-8 w-8 border-4 border-black border-t-comicBlue rounded-full"></div>
                <span id="loadingStatus" class="loading-text text-2xl font-bold font-comic uppercase tracking-wider text-comicRed">Yazar Düşünüyor...</span>
            </div>

            <div id="actionControls" class="hidden w-full flex flex-col md:flex-row gap-4 justify-center">
                <button id="newStoryBtn" class="w-full md:w-2/3 bg-comicBlue hover:bg-blue-600 text-white font-comic text-2xl px-8 py-3 border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] transition-transform active:translate-y-1 active:shadow-none uppercase">
                    Yepyeni Bir Hikaye Üret
                </button>
            </div>
        </div>
    </main>

    <!-- Tam Ekran Okuma Modu (Lightbox) -->
    <div id="lightbox" class="hidden fixed inset-0 z-50 bg-black/95 flex flex-col items-center justify-center backdrop-blur-sm">
        <button id="lightboxClose" class="absolute top-4 right-6 text-white text-5xl hover:text-comicRed transition-colors z-[60] cursor-pointer">&times;</button>
        
        <div class="relative w-full h-full flex items-center justify-center p-4 md:p-12">
            <!-- Sol Ok -->
            <button id="lightboxPrev" class="absolute left-2 md:left-8 top-1/2 -translate-y-1/2 text-white text-5xl md:text-7xl hover:text-comicYellow transition-colors z-50 drop-shadow-lg cursor-pointer">&#10094;</button>
            
            <!-- İçerik -->
            <div class="flex flex-col items-center max-w-5xl max-h-full w-full justify-center relative">
                <img id="lightboxImg" src="" alt="Panel" class="max-w-full max-h-[60vh] object-contain border-4 border-white shadow-2xl rounded">
                
                <div id="lightboxTextContainer" class="mt-6 w-full max-w-3xl bg-white border-4 border-black p-4 md:p-6 shadow-[6px_6px_0px_0px_rgba(255,215,0,1)] text-xl md:text-2xl text-center rounded-xl overflow-y-auto max-h-[25vh] custom-scrollbar">
                    <div id="lightboxNarration" class="mb-3 text-gray-800 leading-snug"></div>
                    <div id="lightboxDialogue" class="font-bold text-black leading-snug"></div>
                </div>
            </div>
            
            <!-- Sağ Ok -->
            <button id="lightboxNext" class="absolute right-2 md:right-8 top-1/2 -translate-y-1/2 text-white text-5xl md:text-7xl hover:text-comicYellow transition-colors z-50 drop-shadow-lg cursor-pointer">&#10095;</button>
        </div>
        
        <!-- Panel Sayacı -->
        <div id="lightboxCounter" class="absolute bottom-6 left-1/2 -translate-x-1/2 text-white font-comic text-3xl tracking-widest drop-shadow-lg bg-black/50 px-4 py-1 rounded-full border-2 border-white">
            1 / 10
        </div>
    </div>

    <!-- Özel Uyarı Ekranı (Custom Alert) -->
    <div id="customAlert" class="hidden fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white border-4 border-black p-6 md:p-8 max-w-md w-full shadow-comic-lg transform rotate-1 flex flex-col items-center text-center">
            <h3 class="text-3xl font-comic text-comicRed mb-4 uppercase">SİSTEM MESAJI</h3>
            <p id="customAlertText" class="text-xl font-sans mb-6 text-gray-800"></p>
            <button onclick="document.getElementById('customAlert').classList.add('hidden')" class="bg-comicYellow hover:bg-yellow-400 text-black border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] font-comic text-2xl px-8 py-2 uppercase transition-transform active:translate-y-1 active:shadow-none">
                Tamam
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // GELİŞTİRİCİ AYARLARI (GITHUB İÇİN)
        // ==========================================
        const CONFIG = {
            // DİKKAT: Kendi GROQ API Key'inizi aşağıdaki tırnak işaretleri arasına yapıştırın.
            // Örnek: "gsk_1234567890abcdef..."
            // Projeyi GitHub'a yüklediğinizde siteye giren herkes bu key'i kullanarak ücretsiz işlem yapacaktır.
				GROQ_API_KEY: "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"
		}; 

        const UI = {
            setupScreen: document.getElementById('setupScreen'),
            gameScreen: document.getElementById('gameScreen'),
            gameSettings: document.getElementById('gameSettings'),
            modelSelect: document.getElementById('modelSelect'),
            themeSelect: document.getElementById('themeSelect'),
            topicInput: document.getElementById('topicInput'),
            startBtn: document.getElementById('startBtn'),
            chatContainer: document.getElementById('chatContainer'),
            actionControls: document.getElementById('actionControls'),
            newStoryBtn: document.getElementById('newStoryBtn'),
            loadingIndicator: document.getElementById('loadingIndicator'),
            loadingStatus: document.getElementById('loadingStatus'),
            resetGameBtn: document.getElementById('resetGameBtn'),
            customAlert: document.getElementById('customAlert'),
            customAlertText: document.getElementById('customAlertText'),
            
            // Lightbox Elements
            lightbox: document.getElementById('lightbox'),
            lightboxImg: document.getElementById('lightboxImg'),
            lightboxNarration: document.getElementById('lightboxNarration'),
            lightboxDialogue: document.getElementById('lightboxDialogue'),
            lightboxPrev: document.getElementById('lightboxPrev'),
            lightboxNext: document.getElementById('lightboxNext'),
            lightboxClose: document.getElementById('lightboxClose'),
            lightboxCounter: document.getElementById('lightboxCounter'),
        };

        let gameState = {
            apiKey: CONFIG.GROQ_API_KEY,
            model: 'llama3-8b-8192',
            theme: '',
            topic: '',
            isProcessing: false,
            panelCount: 0,
            panelsData: [],
            currentLightboxIndex: 0
        };

        // Sayfa yüklendiğinde modelleri otomatik çek
        window.addEventListener('DOMContentLoaded', fetchModelsFromAPI);

        UI.startBtn.addEventListener('click', startGame);
        UI.resetGameBtn.addEventListener('click', resetGame);
        
        UI.newStoryBtn.addEventListener('click', () => {
            resetGame();
        });

        function showCustomAlert(message) {
            UI.customAlertText.innerHTML = message;
            UI.customAlert.classList.remove('hidden');
        }

        async function fetchModelsFromAPI() {
            const key = CONFIG.GROQ_API_KEY;
            
            // Eğer geliştirici key girmemişse uyarı göster ve butonu kilitle
            if (!key || key === "BURAYA_API_KEY_GELECEK") {
                UI.modelSelect.innerHTML = '<option value="">Lütfen Koda API Key Ekleyin!</option>';
                UI.startBtn.classList.add('opacity-50', 'cursor-not-allowed');
                UI.startBtn.textContent = "API KEY EKSİK";
                return;
            }

            try {
                // Modelleri GROQ'dan çek (Sadece Llama gibi text modelleri)
                const response = await fetch('https://api.groq.com/openai/v1/models', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${key}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error("API Anahtarı geçersiz veya servise ulaşılamıyor.");

                const data = await response.json();
                UI.modelSelect.innerHTML = ''; 
                
                const textModels = data.data.filter(model => !model.id.includes('whisper'));
                textModels.sort((a, b) => a.id.localeCompare(b.id));

                textModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.id; 
                    // Varsayılan olarak mantıklı bir model seç
                    if(model.id.includes('llama3-8b')) option.selected = true;
                    UI.modelSelect.appendChild(option);
                });

            } catch (error) {
                console.error("Model yükleme hatası:", error);
                UI.modelSelect.innerHTML = '<option value="llama3-8b-8192">llama3-8b-8192 (Varsayılan)</option>';
            }
        }

        async function startGame() {
            const key = CONFIG.GROQ_API_KEY;
            const topic = UI.topicInput.value.trim();
            
            if (!key || key === "BURAYA_API_KEY_GELECEK") {
                showCustomAlert("<strong>Geliştirici Uyarısı:</strong><br><br>Projeyi kullanmadan önce kodun içindeki <code>CONFIG.GROQ_API_KEY</code> alanına kendi GROQ API anahtarınızı yapıştırmalısınız!");
                return;
            }

            if (!topic) {
                showCustomAlert("Lütfen bir hikaye konusu veya fikri girin! Örneğin: <em>'Kayıp bir robotu arayan dedektif...'</em>");
                UI.topicInput.focus();
                return;
            }

            gameState.apiKey = key;
            gameState.model = UI.modelSelect.value;
            gameState.theme = UI.themeSelect.value;
            gameState.topic = topic;
            
            // Ekran geçişleri
            UI.setupScreen.classList.add('hidden');
            UI.gameScreen.classList.remove('hidden');
            UI.gameScreen.classList.add('flex');
            UI.resetGameBtn.classList.remove('hidden');

            UI.chatContainer.innerHTML = ''; 
            gameState.panelCount = 0;
            gameState.panelsData = []; 
            UI.actionControls.classList.add('hidden');
            
            await generateFullComic();
        }

        function resetGame() {
            UI.gameScreen.classList.add('hidden');
            UI.gameScreen.classList.remove('flex');
            UI.setupScreen.classList.remove('hidden');
            UI.resetGameBtn.classList.add('hidden');
            UI.chatContainer.innerHTML = '';
            UI.topicInput.value = ''; // Konuyu sıfırla
        }

        async function generateFullComic() {
            setProcessing(true, "Yazar Hikayeyi Kurguluyor (10 Panel)...");

            // Yapay zekaya verilecek kesin format talimatı
            const promptText = `Sen usta bir çizgi roman yazarısın. 
Tema: ${gameState.theme}
Konu: ${gameState.topic}

Görevin bu konuyla ilgili tam 10 panellik (karelik) etkileyici, aksiyon dolu, diyalog barındıran veya dramatik uzun bir çizgi roman sayfası oluşturmak. 

DİL: Anlatım metinleri TÜRKÇE, diyaloglar TÜRKÇE, görsel promptları İNGİLİZCE olacak.

LÜTFEN SADECE AŞAĞIDAKİ FORMATTA YANIT VER. BAŞKA HİÇBİR AÇIKLAMA METNİ YAZMA:

---PANEL 1---
NARRATION: [Türkçe dış ses anlatımı (kısa)]
DIALOGUE: [Karakter Adı]: [Türkçe konuşma] (Eğer bu panelde konuşma yoksa YOK yaz)
IMAGE: [Görsel için detaylı İngilizce prompt, virgüllerle ayır]

---PANEL 2---
NARRATION: [Türkçe dış ses anlatımı (kısa)]
DIALOGUE: [Karakter Adı]: [Türkçe konuşma] (Eğer bu panelde konuşma yoksa YOK yaz)
IMAGE: [Görsel için detaylı İngilizce prompt, virgüllerle ayır]

... (10 panele kadar bu formatta devam et) ...`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${gameState.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: gameState.model,
                        messages: [{ role: "user", content: promptText }],
                        temperature: 0.7,
                        max_tokens: 4000
                    })
                });

                if (!response.ok) throw new Error("GROQ API Hatası.");

                const data = await response.json();
                const aiMessage = data.choices[0].message.content;
                
                await parseAndRenderPanels(aiMessage);

            } catch (error) {
                renderSystemMessage(`HATA: ${error.message}. Lütfen API Anahtarınızı ve internet bağlantınızı kontrol edip tekrar deneyin.`);
                setProcessing(false);
                UI.actionControls.classList.remove('hidden');
            }
        }

        async function parseAndRenderPanels(script) {
            const panels = script.split(/---PANEL\s*\d+---/i).filter(p => p.trim() !== '');
            const totalPanels = panels.length;
            
            for (let i = 0; i < panels.length; i++) {
                const panelText = panels[i];
                let narration = "";
                let dialogue = "";
                let imagePrompt = `${gameState.theme} setting, detailed, dramatic lighting`;

                // Metin içi ayıklamalar
                const narMatch = panelText.match(/NARRATION:\s*(.*?)(?=DIALOGUE:|IMAGE:|$)/is);
                if (narMatch) narration = narMatch[1].trim();

                const diaMatch = panelText.match(/DIALOGUE:\s*(.*?)(?=IMAGE:|$)/is);
                if (diaMatch) {
                    dialogue = diaMatch[1].trim();
                    if(dialogue.toUpperCase() === "YOK") dialogue = "";
                }

                const imgMatch = panelText.match(/IMAGE:\s*(.*?)(?=$)/is);
                if (imgMatch) imagePrompt = imgMatch[1].trim();

                setProcessing(true, `Çizer Panel ${i + 1}/${totalPanels} Çiziyor... 🎨`);
                const generatedImageUrl = await generateImageWithPollinations(imagePrompt);
                renderComicPanel(narration, dialogue, generatedImageUrl);
            }
            
            setProcessing(false);
            UI.actionControls.classList.remove('hidden');
        }

        async function generateImageWithPollinations(prompt) {
            try {
                // Çizgi roman tarzını zorlamak için prompt zenginleştirme
                const enhancedPrompt = `${prompt}, comic book style, graphic novel art, thick ink lines, highly detailed, expressive, vibrant colors`;
                const encodedPrompt = encodeURIComponent(enhancedPrompt);
                
                // Rastgele bir seed vererek tekrarı önleme
                const seed = Math.floor(Math.random() * 1000000);
                const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=768&nologo=true&seed=${seed}`;
                
                // URL'in erişilebilir olduğunu kontrol etme
                const response = await fetch(imageUrl);
                if (response.ok) {
                    return imageUrl;
                }
                
                throw new Error("Görsel üretilemedi.");
            } catch (error) {
                console.error("Görsel Üretim Hatası:", error);
                return null;
            }
        }

        function setProcessing(isProcessing, statusText = "") {
            gameState.isProcessing = isProcessing;
            
            if (isProcessing) {
                UI.loadingStatus.textContent = statusText;
                UI.loadingIndicator.classList.remove('hidden');
                UI.actionControls.classList.add('hidden');
            } else {
                UI.loadingIndicator.classList.add('hidden');
            }
        }

        function renderSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'col-span-1 md:col-span-2 bg-red-100 border-2 border-red-500 text-red-700 p-3 font-bold text-center mt-4';
            div.textContent = text;
            UI.chatContainer.appendChild(div);
            scrollToBottom();
        }

        function renderComicPanel(narrationText, dialogueText, imageUrl) {
            gameState.panelCount++;
            const panelIndex = gameState.panelCount - 1;

            // Paneli tam ekran modunda göstermek için hafızaya kaydet
            gameState.panelsData.push({
                narration: narrationText,
                dialogue: dialogueText,
                image: imageUrl
            });
            
            const panel = document.createElement('div');
            panel.className = 'comic-panel shadow-comic fade-in-up flex flex-col group h-full cursor-pointer hover:scale-[1.02] hover:z-10 transition-all duration-300 ring-4 ring-transparent hover:ring-comicBlue';
            panel.onclick = () => openLightbox(panelIndex);
            
            // Çizgi roman hissi için hafif döndürmeler
            const rotations = ['rotate-1', '-rotate-1', 'rotate-0', 'rotate-2', '-rotate-2'];
            const rot = rotations[gameState.panelCount % rotations.length];
            panel.classList.add(rot);

            // Resim Kapsayıcısı
            const imgContainer = document.createElement('div');
            imgContainer.className = 'image-container bg-gray-200 relative min-h-[300px] md:min-h-[400px] flex-1 flex items-center justify-center';
            
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.alt = "Comic Panel Image";
                img.className = "absolute inset-0 w-full h-full object-cover";
                imgContainer.appendChild(img);
            } else {
                imgContainer.innerHTML = '<span class="font-comic text-gray-500 text-2xl transform -rotate-12">Görsel Çizilemedi :(</span>';
            }

            // Panel Sayısı Rozeti
            const badge = document.createElement('div');
            badge.className = 'absolute top-2 left-2 z-10 bg-white border-2 border-black font-comic px-2 py-0.5 text-sm font-bold shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]';
            badge.textContent = `#${gameState.panelCount}`;
            imgContainer.appendChild(badge);

            // Metin ve Diyalog Kapsayıcısı
            const contentContainer = document.createElement('div');
            contentContainer.className = 'flex flex-col p-4 gap-3 bg-gray-50 flex-none min-h-[120px]';

            // Dış Ses Kutusu (Narration)
            if (narrationText && narrationText.toUpperCase() !== "YOK" && narrationText !== "") {
                const narrBox = document.createElement('div');
                narrBox.className = 'narration-box p-3 text-lg leading-snug bg-yellow-100';
                
                let formattedText = narrationText
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<span class="font-bold">$1</span>')
                    .replace(/\*(.*?)\*/g, '<span class="italic">$1</span>');
                
                narrBox.innerHTML = formattedText;
                contentContainer.appendChild(narrBox);
            }

            // Konuşma Balonu (Dialog)
            if (dialogueText && dialogueText.toUpperCase() !== "YOK" && dialogueText !== "") {
                const bubbleBox = document.createElement('div');
                bubbleBox.className = 'speech-bubble text-xl leading-snug mt-2';
                
                const parts = dialogueText.split(':');
                if(parts.length > 1) {
                    const charName = document.createElement('div');
                    charName.className = 'character-name';
                    charName.textContent = parts[0].trim();
                    bubbleBox.appendChild(charName);
                    
                    const dialogTextNode = document.createElement('span');
                    dialogTextNode.innerHTML = parts.slice(1).join(':').trim();
                    bubbleBox.appendChild(dialogTextNode);
                } else {
                    bubbleBox.innerHTML = dialogueText;
                }
                
                contentContainer.appendChild(bubbleBox);
            }

            panel.appendChild(imgContainer);
            panel.appendChild(contentContainer);
            
            UI.chatContainer.appendChild(panel);
            
            if(imageUrl) {
                const imgCheck = panel.querySelector('img');
                imgCheck.onload = scrollToBottom;
            } else {
                scrollToBottom();
            }
        }

        function scrollToBottom() {
            setTimeout(() => {
                UI.chatContainer.scrollTo({
                    top: UI.chatContainer.scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);
        }

        function openLightbox(index) {
            if(gameState.panelsData.length === 0 || !gameState.panelsData[index]) return;
            gameState.currentLightboxIndex = index;
            updateLightboxContent();
            UI.lightbox.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        function closeLightbox() {
            UI.lightbox.classList.add('hidden');
            document.body.style.overflow = 'auto'; 
        }

        function nextLightbox() {
            if (gameState.currentLightboxIndex < gameState.panelsData.length - 1) {
                gameState.currentLightboxIndex++;
                updateLightboxContent();
            }
        }

        function prevLightbox() {
            if (gameState.currentLightboxIndex > 0) {
                gameState.currentLightboxIndex--;
                updateLightboxContent();
            }
        }

        function updateLightboxContent() {
            const data = gameState.panelsData[gameState.currentLightboxIndex];
            
            if(data.image) {
                UI.lightboxImg.src = data.image;
                UI.lightboxImg.classList.remove('hidden');
            } else {
                UI.lightboxImg.src = '';
                UI.lightboxImg.classList.add('hidden');
            }

            UI.lightboxNarration.innerHTML = '';
            UI.lightboxDialogue.innerHTML = '';
            
            let hasText = false;

            if (data.narration && data.narration.toUpperCase() !== "YOK" && data.narration.trim() !== "") {
                 UI.lightboxNarration.innerHTML = `<span class="bg-yellow-200 px-3 py-1 rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] inline-block text-left w-full">${data.narration}</span>`;
                 hasText = true;
            }
            
            if (data.dialogue && data.dialogue.toUpperCase() !== "YOK" && data.dialogue.trim() !== "") {
                const parts = data.dialogue.split(':');
                if(parts.length > 1) {
                    UI.lightboxDialogue.innerHTML = `<div class="text-left"><span class="text-comicRed text-3xl font-comic tracking-wide uppercase">${parts[0].trim()}:</span> <span class="font-sans text-2xl">${parts.slice(1).join(':').trim()}</span></div>`;
                } else {
                    UI.lightboxDialogue.innerHTML = `<div class="text-left font-sans text-2xl">${data.dialogue}</div>`;
                }
                hasText = true;
            }

            const textContainer = document.getElementById('lightboxTextContainer');
            if (hasText) {
                textContainer.classList.remove('hidden');
            } else {
                textContainer.classList.add('hidden');
            }

            UI.lightboxCounter.textContent = `${gameState.currentLightboxIndex + 1} / ${gameState.panelsData.length}`;
            
            UI.lightboxPrev.style.opacity = gameState.currentLightboxIndex === 0 ? '0.2' : '1';
            UI.lightboxPrev.style.cursor = gameState.currentLightboxIndex === 0 ? 'default' : 'pointer';
            
            UI.lightboxNext.style.opacity = gameState.currentLightboxIndex === gameState.panelsData.length - 1 ? '0.2' : '1';
            UI.lightboxNext.style.cursor = gameState.currentLightboxIndex === gameState.panelsData.length - 1 ? 'default' : 'pointer';
        }

        UI.lightboxClose.addEventListener('click', closeLightbox);
        UI.lightboxNext.addEventListener('click', (e) => { e.stopPropagation(); nextLightbox(); });
        UI.lightboxPrev.addEventListener('click', (e) => { e.stopPropagation(); prevLightbox(); });
        
        UI.lightbox.addEventListener('click', (e) => {
            if(e.target === UI.lightbox || e.target.parentElement === UI.lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (UI.lightbox.classList.contains('hidden')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextLightbox();
            if (e.key === 'ArrowLeft') prevLightbox();
        });

    </script>
</body>
</html>
